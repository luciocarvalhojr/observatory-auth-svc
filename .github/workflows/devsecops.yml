name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage gate (80%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below the 80% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% passes"

      - name: Verify Swagger docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/api/main.go
          if [ -n "$(git status --porcelain docs/)" ]; then
            echo "Swagger docs are out of date. Run 'swag init -g cmd/api/main.go' locally."
            exit 1
          fi

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # gitleaks needs full history

      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache: true

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Gosec (SAST)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.23.0
          gosec ./...

      - name: Govulncheck (SCA)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  docker-scan:
    runs-on: ubuntu-latest
    needs: [test-and-lint, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t auth-svc:${{ github.sha }} .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: auth-svc:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
